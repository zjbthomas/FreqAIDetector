AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  FreqAIDetectorApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Api-Key'"
        AllowOrigin: "'*'"
      Auth:
        ApiKeyRequired: true
        UsagePlan:
          CreateUsagePlan: PER_API
          UsagePlanName: FreqAIDetectorUsagePlan
          Throttle:
            RateLimit: 1
            BurstLimit: 2
          Quota:
            Limit: 200
            Period: MONTH

  FreqAIDetectorFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.handler
      Runtime: python3.8
      CodeUri: .
      MemorySize: 1024
      Timeout: 30
      Environment:
        Variables:
          UPLOAD_BUCKET: freqaidetector-demo-bucket
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
              Resource: arn:aws:s3:::freqaidetector-demo-bucket/*
      Events:
        DetectApi:
          Type: Api
          Properties:
            RestApiId: !Ref FreqAIDetectorApi
            Path: /detect
            Method: post